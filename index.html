<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kira AI – Network Digital Twin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Kira AI</h1>
    <p>Cognitive Network Twin for QoS Optimization</p>
  </header>

  <div class="container">
    <div class="topbar">
      <label for="citySelect">Select City:</label>
      <select id="citySelect" onchange="switchCity()"></select>
    </div>

    <div class="controls">
      <button onclick="simulateTraffic()">Increase Traffic</button>
      <button onclick="failTower()">Simulate Tower Failure</button>
      <button onclick="optimizeNetwork()">Optimize Network</button>
    </div>

    <div class="city-info">
      <h2 id="cityName">City</h2>
      <p id="cityDescription">Network overview</p>
    </div>

    <div id="network"></div>

    <div class="stats">
      <p>QoS Score: <span id="qos">0</span></p>
      <p>Status: <span id="status">Normal</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
